services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ./scripts:/scripts
      - ./shared:/data/out
    environment:
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n-files;/data/out;/scripts
    depends_on:
      - python
    networks:
      - n8n-net

  python:
    build: .
    container_name: n8n-python
    volumes:
      - ./scripts:/scripts
      - ./shared:/data/out
    ports:
      - "2222:22"
    networks:
      - n8n-net

networks:
  n8n-net:
    driver: bridge
